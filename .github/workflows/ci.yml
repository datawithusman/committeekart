# ============================================
# CommitteeKart CI Pipeline
# ============================================
# Runs on every push to main and every pull request.
# Steps: lint, type-check, unit tests, build.
# If any step fails, the pipeline stops.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the code.
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Node.js.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # 3. Install dependencies.
      - name: Install dependencies
        run: npm ci

      # 4. Run linting.
      - name: Lint
        run: npm run lint

      # 5. Run TypeScript type checking.
      - name: Type check
        run: npx tsc --noEmit

      # 6. Run unit tests.
      - name: Unit tests
        run: npm test

      # 7. Build the project.
      - name: Build
        run: npm run build
        env:
          # Placeholder values so the build does not fail on env checks.
          # Vercel provides the real values at deploy time.
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY || 'placeholder-key' }}
